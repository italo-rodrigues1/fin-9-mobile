name: Mobile Deploy

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - "mobile/**"
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: production
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: "Target platform"
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all

permissions:
  contents: read

concurrency:
  group: mobile-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: EAS Build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    defaults:
      run:
        working-directory: mobile

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_NO_VCS: 1
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_URL: ${{ secrets.SENTRY_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "The EXPO_TOKEN secret is required to run EAS builds."
            exit 1
          fi

      - name: Build merged PR for production
        if: github.event_name == 'pull_request'
        run: eas build --platform android --profile production --non-interactive --no-wait

      - name: Build from manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: eas build --platform "${{ inputs.platform }}" --profile "${{ inputs.profile }}" --non-interactive --no-wait
